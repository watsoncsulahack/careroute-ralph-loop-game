<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareRoute 8-bit Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>CareRoute 8-bit Prototype</h1>
    <p class="subtitle">Role-play: Insurance, Hospital, or Ambulance — all aligned to save lives</p>

    <div class="hud">
      <div>Round: <span id="round">1</span>/4</div>
      <div>Lives Saved Potential: <span id="timeScore">50</span></div>
      <div>Stakeholder Trust: <span id="costScore">50</span></div>
      <div>Coordination Quality: <span id="fitScore">50</span></div>
      <div>Current Role: <span id="total">Not selected</span></div>
    </div>

    <div class="progressWrap">
      <div id="progressBar" class="progressBar"></div>
    </div>
    <div id="coach" class="coach"></div>

    <div id="stageCard" class="card"></div>
    <div id="choices" class="choices"></div>

    <div class="controls">
      <button id="restart">Restart</button>
    </div>

    <div id="result" class="result"></div>
    <div id="history" class="history"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
